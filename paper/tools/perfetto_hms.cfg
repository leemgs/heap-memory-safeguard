# Perfetto trace config for HMS experiments (textproto).
# Usage: perfetto -c perfetto_hms.cfg --txt -o trace.perfetto-trace
# Captures: vmscan/reclaim tracepoints (L_r), ART GC slices (T_gc),
# per-process RSS/stat, and system meminfo/vmstat/PSI.

buffers:      { size_kb: 131072  fill_policy: RING_BUFFER }
buffers:      { size_kb: 8192    fill_policy: RING_BUFFER }

data_sources: {
  config {
    name: "linux.ftrace"
    ftrace_config {
      # --- Reclaim path: used to measure L_r (reclaim latency) ---
      ftrace_events: "vmscan/mm_vmscan_direct_reclaim_begin"
      ftrace_events: "vmscan/mm_vmscan_direct_reclaim_end"
      ftrace_events: "vmscan/mm_vmscan_kswapd_wake"
      ftrace_events: "vmscan/mm_vmscan_kswapd_sleep"
      # --- Faults / swap / OOM ---
      ftrace_events: "kmem/rss_stat"
      ftrace_events: "kmem/mm_page_alloc"
      ftrace_events: "oom/mark_victim"
      ftrace_events: "sched/sched_switch"
      # --- ART GC + app rendering (atrace userspace categories) ---
      atrace_categories: "dalvik"   # ART GC pause slices -> T_gc
      atrace_categories: "gfx"      # frame slices -> p99 frame time
      atrace_categories: "view"
      atrace_categories: "am"
      atrace_apps: "*"
      buffer_size_kb: 16384
    }
  }
}

data_sources: {
  config {
    name: "linux.process_stats"
    process_stats_config {
      scan_all_processes_on_start: true
      proc_stats_poll_ms: 1000     # per-process RSS, majflt, etc.
    }
  }
}

data_sources: {
  config {
    name: "linux.sys_stats"
    sys_stats_config {
      meminfo_period_ms: 1000
      vmstat_period_ms:  1000
      stat_period_ms:    1000
      # PSI sampling requires a recent Perfetto + kernel PSI; uncomment if available:
      # psi_period_ms:   1000
    }
  }
}

# Default 60 s window; override per workload as needed.
duration_ms: 60000
